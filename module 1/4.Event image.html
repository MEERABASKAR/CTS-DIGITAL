<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Community Event Gallery</title>
<style>
.event-img{
width:180px;
height:50px;
border:3px solid black;
}
table{
margin:auto;
border-collapse:collapse;
}
td{
padding:10px;
font-align: center;
}
.caption{
font-weight: bold;
font-style: Times New Roman;
margin-top=5px;
</style>
</head>
<body>

<table>
<tr>
        <td>
            <img src="event1.jpg" alt="Music Festival" title="Music Festival" class="event-img">
            <div class="caption">Music Festival</div>
        </td>

        <td>
            <img src="event2.jpg" alt="Food Fair" title="Food Fair" class="event-img">
            <div class="caption">Food Fair</div>
        </td>

        <td>
            <img src="event3.jpg" alt="Art Exhibition" title="Art Exhibition" class="event-img">
            <div class="caption">Art Exhibition</div>
        </td>
    </tr>

    <!-- Row 2 -->
    <tr>
        <td>
            <img src="event4.jpg" alt="Sports Meet" title="Sports Meet" class="event-img">
            <div class="caption">Sports Meet</div>
        </td>

        <td>
            <img src="event5.jpg" alt="Tech Workshop" title="Tech Workshop" class="event-img">
            <div class="caption">Tech Workshop</div>
        </td>

        <td>
            <img src="event6.jpg" alt="Cultural Night" title="Cultural Night" class="event-img">
            <div class="caption">Cultural Night</div>
        </td>
    </tr>

</table>

</body>
</html>
