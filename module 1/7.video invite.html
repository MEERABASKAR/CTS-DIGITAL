<!DOCTYPE html>
<html>
<head>
<title>Event Video Invite</title>

<script>
function videoReady() {
    document.getElementById("msg").innerHTML = "Video ready to play";
}

window.onbeforeunload = function() {
    return "Are you sure you want to leave?";
}
</script>

</head>

<body>

<h2>Event Promo Video</h2>

<video width="300" controls oncanplay="videoReady()">
    <source src="sample.mp4" type="video/mp4">
</video>

<p id="msg"></p>

</body>
</html>
